
services:
  # =========================================================================
  # OpenSearch - Primary Search Engine
  # =========================================================================
  opensearch-node1:
    image: opensearchproject/opensearch:latest
    container_name: firmable-opensearch-node1
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms6g -Xmx6g"
      # Disable security for development/testing
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MySecurePassword123!
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    networks:
      - search-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: firmable-opensearch-dashboards
    ports:
      - 5601:5601
    expose:
      - "5601"
    environment:
      OPENSEARCH_HOSTS: '["https://firmable-opensearch-node1:9200"]'
      opensearch.ssl.verificationMode: none
      opensearch.username: admin
      opensearch.password: MySecurePassword123!
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: MySecurePassword123!
    networks:
      - search-network


  # =========================================================================
  # PostgreSQL - User Data & Tags
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: firmable-postgres
    environment:
      - POSTGRES_DB=firmable_search
      - POSTGRES_USER=firmable_user
      - POSTGRES_PASSWORD=password123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - search-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U firmable_user -d firmable_search"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # =========================================================================
  # Redis - Caching & Session Management
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: firmable-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - search-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # =========================================================================
  # FastAPI Backend
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: firmable-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DEBUG=true
      - OPENSEARCH_HOST=opensearch-node1
      - OPENSEARCH_PORT=9200
      - DATABASE_URL=postgresql://firmable_user:password123@postgres:5432/firmable_search
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      opensearch-node1:
        condition: service_started
      postgres:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - search-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  
  # =========================================================================
  # React Frontend
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: firmable-frontend
    ports:
      - "5173:5173"
      - "5174:5174"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - search-network
    environment:
      - VITE_API_URL=http://localhost:8000
    command: npm run dev

volumes:
  opensearch-data:
  postgres-data:
  redis-data:

networks:
  search-network:
    driver: bridge
